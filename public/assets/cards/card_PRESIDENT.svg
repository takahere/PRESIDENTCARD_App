<svg width="343" height="216" viewBox="0 0 343 216" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F5F5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D0D0D0;stop-opacity:1" />
    </linearGradient>
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" in2="noise" mode="multiply"/>
    </filter>
  </defs>

  <!-- Card Background -->
  <rect width="343" height="216" rx="16" fill="url(#cardGradient)"/>

  <!-- Subtle texture overlay -->
  <rect width="343" height="216" rx="16" fill="#E5E5E5" opacity="0.3"/>

  <!-- PRESIDENT Text -->
  <text x="171.5" y="80" font-family="SF Pro Display, system-ui, sans-serif" font-size="18" font-weight="500" fill="#AAAAAA" text-anchor="middle" letter-spacing="6">PRESIDENT</text>

  <!-- VISA Logo -->
  <text x="303" y="186" font-family="Arial, sans-serif" font-size="24" font-weight="bold" font-style="italic" fill="#BBBBBB" text-anchor="end">VISA</text>
</svg>
